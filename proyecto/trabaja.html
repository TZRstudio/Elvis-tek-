<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trabajá con nosotros - Elvis-Tek</title>
  </head>
  <body>
    <div>
      <h1>Trabajá con nosotros</h1>
      <a href="index.html">Volver al inicio</a>
    </div>
    <div>
      <h2>Formulario de postulación</h2>
      <form id="formTrabajo">
        <label for="email">Correo electrónico *</label><br>
        <input type="email" id="email" name="email" placeholder="nombre@correo.com" autocomplete="email" required><br><br>
        <label for="texto">Contanos sobre vos *</label><br>
        <textarea id="texto" name="texto" placeholder="Tu experiencia, habilidades, por qué te interesa trabajar con nosotros..." rows="5" cols="40" required></textarea><br><br>
        <label for="cv">Currículum (PDF) *</label><br>
        <input type="file" id="cv" name="cv" accept=".pdf" required><br><br>
        <input type="checkbox" id="acepto" name="acepto" required>
        <label for="acepto">Acepto ser contactado por la empresa.</label><br><br>
        <button type="submit">Enviar postulación</button>
      </form>
    </div>
    <script>
      document.getElementById('formTrabajo').addEventListener('submit', function (e) {
        e.preventDefault();
        if (!document.getElementById('acepto').checked) {
          alert('Tenés que aceptar ser contactado para continuar.');
          return;
        }
        if (document.getElementById('cv').files.length === 0) {
          alert('Adjuntá tu currículum en PDF.');
          return;
        }
        alert('Postulación enviada correctamente.');
      });
    </script>
  </body>
</html>
